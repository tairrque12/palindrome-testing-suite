<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steam & Silicon | Cart</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Your custom styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- BOOTSTRAP NAVBAR -->
<nav class="navbar navbar-expand-lg" id="mainNav">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
            <img src="images/Steam&SiliconLogo.png" alt="Steam and Silicon Logo" height="50">
            <span>Steam & Silicon</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navLinks">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="reservations.html">Reservations</a></li>
                <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CART INTRO -->
<section class="reservation-intro">
    <h1>Your Cart</h1>
    <p>Review your order below. All totals are calculated automatically.</p>
</section>

<!-- CART CONTENT — JavaScript renders everything here -->
<div id="cart-container" style="max-width: 50rem; margin: 2rem auto; padding: 0 2rem;">

    <!-- Cart items table — JavaScript fills this -->
    <div id="cart-items"></div>

    <!-- Totals section — JavaScript fills this -->
    <div id="cart-totals"></div>

    <!-- Cart buttons — hidden until cart loads -->
    <div id="cart-buttons" style="display:none; margin-top: 2rem;">
        <button id="cancel-btn" class="btn-cancel">Cancel Order</button>
        <button id="submit-btn" class="btn-submit">Submit Order</button>
    </div>

</div>

<!-- CANCEL CONFIRMATION MODAL -->
<div class="modal fade" id="cancelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Cancel Order</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to cancel your order?</p>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn-cancel" id="confirm-cancel-btn">Yes, Cancel</button>
                <button type="button" class="btn-submit" data-bs-dismiss="modal">No, Keep Order</button>
            </div>
        </div>
    </div>
</div>

<!-- THANK YOU MODAL — shows after cancel is confirmed -->
<div class="modal fade" id="thankYouModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Order Cancelled</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Thank you! Your order has been cancelled. Redirecting you to the menu...</p>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<!-- Your JavaScript -->
<script src="script.js"></script>
</body>
</html>
