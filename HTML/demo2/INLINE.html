<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS DEMO 1</title>
    <link rel="stylesheet" href="style.css">

  <style>
      body{
          background-color: deepskyblue;
      }
      div{
          border: 3px red solid;
          font-size: 75px;
      }
      #onions{
          border: 3px green;
      }
      #fries.yummy{
          font-weight: bolder;
      }

    </style>
</head>

<body>

<div id="burger" class="yummy">
    <p>I would like a burger with fries</p>
</div>

<div id="onions">
    <p>I would also like extra onions</p>
</div>

<div id="fries">
    <p>And a side of salty fries please</p>
</div>

</body>

</html>
