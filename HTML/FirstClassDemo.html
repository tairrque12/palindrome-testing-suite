<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>First Demo</title>

</head>

<body>
<h1>Please Submit Armed Services Information</h1>


<form action="/submit" method="POST">
    <!-- this tells the browser when I slick submit send to server.
    submit is where the data goes.
    method is where the data is sent.
    -->

    <fieldset>
        <!-- fieldset groups input into a box
        Personal information is the name of the box
        legend places it in the box
        -->
        <legend>Personal Information</legend>

        <!--THIS IS A PAIR -->
    <label for="full_name">Full Name</label>
    <input type="text" name="full_name" id="full_name">

    <label for="email">Email</label>
    <input type="email" name="email" id="email">

    <label for="password">Password</label>
    <input type="password" name="password" id="password">
    </fieldset>

    <fieldset>
        <legend>Military Information</legend>

    <label>Army<input type="radio" name="branch" value="Army" id="radio" ></label>
    <label>Navy<input type="radio" name="branch" value="Navy"></label>
    <label>Marines<input type="radio" name="branch" value="Marines"></label>
    </fieldset>

    <input type="submit">
</form>





</form>

</body>
</html>
